# Configuration Telegraf pour Proxmox VE
# Copier dans /etc/telegraf/telegraf.d/proxmox.conf

# Sortie vers InfluxDB 2.x
[[outputs.influxdb_v2]]
  urls = ["http://192.168.1.200:8086"]
  token = "TON_TOKEN_INFLUXDB"
  organization = "CelialexHome"
  bucket = "Proxmox"

# Températures CPU et disques (capteurs hwmon)
[[inputs.temp]]

# Santé des disques S.M.A.R.T.
[[inputs.smart]]
  path_smartctl = "/usr/sbin/smartctl"
  use_sudo = true
  devices = ["/dev/sda", "/dev/nvme0n1", "/dev/sdb"]

# Espace disque
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# CPU détaillé
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false

# RAM détaillée
[[inputs.mem]]

# Système (load average, uptime)
[[inputs.system]]
